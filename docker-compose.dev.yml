# Development override — builds from local source instead of pulling from Docker Hub.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Rebuild after code changes:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build nebula-api
#
# Logs:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml logs -f nebula-api
#
# Stop:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml down

services:
  nebula-api:
    image: nebula-api:dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
