# Development override — builds from local source instead of pulling from Docker Hub.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Rebuild after code changes:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build new-api
#
# Logs:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml logs -f new-api
#
# Stop:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml down

services:
  new-api:
    image: new-api:dev
    build:
      context: .
      dockerfile: Dockerfile
