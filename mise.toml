[tasks.dev-up]
description = "Build and start all services (local image)"
run = "docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build"

[tasks.dev-rebuild]
description = "Rebuild and restart only nebula-api (keeps DB/Redis)"
run = "docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build nebula-api"

[tasks.dev-logs]
description = "Follow nebula-api container logs"
run = "docker compose -f docker-compose.yml -f docker-compose.dev.yml logs -f nebula-api"

[tasks.dev-down]
description = "Stop all services"
run = "docker compose -f docker-compose.yml -f docker-compose.dev.yml down"

[tasks.dev-reset]
description = "Stop all services and delete volumes (DB data lost)"
run = "docker compose -f docker-compose.yml -f docker-compose.dev.yml down -v"

# ── Production ──────────────────────────────────────────────

[tasks.prod-up]
description = "Build and start production services"
run = "docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build"

[tasks.prod-rebuild]
description = "Rebuild and restart only nebula-api in production"
run = "docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build nebula-api"

[tasks.prod-logs]
description = "Follow production nebula-api logs"
run = "docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod logs -f nebula-api"

[tasks.prod-logs-all]
description = "Follow all production container logs"
run = "docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod logs -f"

[tasks.prod-down]
description = "Stop production services"
run = "docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod down"

[tasks.prod-status]
description = "Show production container status"
run = "docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod ps"

[tasks.prod-pull]
description = "Git pull and rebuild production"
run = "git pull origin main-plus && mise run prod-rebuild"

[tasks.prod-backup]
description = "Backup PostgreSQL database to timestamped SQL file"
run = """
BACKUP_DIR="${DATA_DIR:-./data}/backups"
mkdir -p "$BACKUP_DIR"
TIMESTAMP=$(date +%Y%m%d_%H%M%S)
docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod \
  exec -T postgres pg_dumpall -U "${POSTGRES_USER:-newapi}" \
  > "$BACKUP_DIR/db_$TIMESTAMP.sql"
echo "Backup saved to $BACKUP_DIR/db_$TIMESTAMP.sql"
ls -lh "$BACKUP_DIR/db_$TIMESTAMP.sql"
"""

[tasks.prod-restore]
description = "Restore PostgreSQL from backup (usage: mise run prod-restore -- path/to/backup.sql)"
run = """
if [ -z "$1" ]; then
  echo "Usage: mise run prod-restore -- path/to/backup.sql"
  exit 1
fi
echo "Restoring from $1 ..."
docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod \
  exec -T postgres psql -U "${POSTGRES_USER:-newapi}" -d "${POSTGRES_DB:-newapi}" < "$1"
echo "Restore complete."
"""

# ── Local development ──────────────────────────────────────

[tasks.build]
description = "Build Go binary"
run = "go build -o nebula-api"

[tasks.run]
description = "Run backend dev server"
run = "go run main.go"

[tasks.test]
description = "Run all Go tests"
run = "go test ./..."

[tasks."test:controller"]
description = "Run controller tests (subscription, topup, token)"
run = "go test ./controller/ -v"

# ── E2E Testing ────────────────────────────────────────────

[tasks.e2e]
description = "Run Playwright E2E tests (headless)"
dir = "web"
run = "npx playwright test"

[tasks."e2e:headed"]
description = "Run E2E tests with visible browser"
dir = "web"
run = "npx playwright test --headed"

[tasks."e2e:codegen"]
description = "Open Playwright codegen to record test specs"
dir = "web"
run = "npx playwright codegen http://localhost:3099 --locale zh-CN"

# ── Frontend ───────────────────────────────────────────────

[tasks.fe-dev]
description = "Start frontend dev server"
dir = "web"
run = "bun run dev"

[tasks.fe-build]
description = "Build frontend for production"
dir = "web"
run = "bun install && bun run build"

[tasks.fe-lint]
description = "Lint frontend code"
dir = "web"
run = "bun run lint"

[tasks.docs-dev]
description = "Start docs dev server"
dir = "docs"
run = "bun run dev"

[tasks.docs-build]
description = "Build docs for production"
dir = "docs"
run = "bun install && bun run build"

# ── Help & Status ──────────────────────────────────────────

[tasks.help]
description = "Show quick reference (commands cheat sheet)"
run = "sed -n '/^## Quick Reference/,/^---$/p' docs/project-guide.md | sed '$d'"

[tasks."help:detail"]
description = "Show full project guide"
run = "cat docs/project-guide.md"

[tasks.status]
description = "Git branch, worktrees, recent commits"
run = """
echo "=== Branch ==="
git branch --show-current
echo ""
echo "=== Worktrees ==="
git worktree list
echo ""
echo "=== Recent Commits ==="
git log --oneline -10
"""
